apiVersion: apps/v1
kind: Deployment
metadata:
  name: template-web
  namespace: go-astro-template
spec:
  replicas: 2
  selector:
    matchLabels:
      app: template-web
  template:
    metadata:
      labels:
        app: template-web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/go-astro-template-web:latest
          ports:
            - containerPort: 4321
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
