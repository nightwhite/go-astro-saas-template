apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: template-ingress
  namespace: go-astro-template
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: template.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: template-web
                port:
                  number: 4321
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: template-api
                port:
                  number: 8080
